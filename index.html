<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impetus | Inovação com Propósito</title>
    <style>
        :root {
            --bg-dark: #050510;
            --purple-main: #7a28ff;
            --magenta-accent: #ff00ff;
            --cyan-accent: #00f2ff;
            --text-silver: #e0e0e0;
        }

        body {
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-silver);
            scroll-behavior: smooth;
        }

        /* Menu/Logo Container */
        .navbar {
            padding: 20px;
            display: flex;
            justify-content: center;
            background: rgba(5, 5, 16, 0.9);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-img {
            height: 60px; /* Ajuste conforme necessário */
            filter: drop-shadow(0 0 10px var(--purple-main));
        }

        /* Hero Section */
        header {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 4rem);
            background: linear-gradient(to right, var(--cyan-accent), var(--magenta-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0;
        }

        /* Seção Sobre a Startup */
        .about-section {
            padding: 100px 20px;
            max-width: 1000px;
            margin: 0 auto;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            align-items: center;
        }

        .about-text h2 {
            color: var(--cyan-accent);
            font-size: 2rem;
        }

        .about-text p {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #b0b0c0;
        }

        /* Estilo da Contagem Regressiva */
        .countdown {
            display: flex;
            gap: 15px;
            margin-top: 50px;
        }

        .unit {
            background: linear-gradient(145deg, #101025, #050510);
            border: 1px solid var(--purple-main);
            padding: 15px;
            border-radius: 12px;
            min-width: 80px;
        }

        .unit span {
            display: block;
            font-size: 2rem;
            font-weight: 800;
            color: var(--magenta-accent);
        }

        @media (max-width: 768px) {
            .about-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <img src="logo.jpeg" alt="Logo Impetus" class="logo-img">
    </nav>

    <header>
        <h1>Acelerando a Mudança Social</h1>
        <p style="max-width: 600px; font-size: 1.3rem;">Usando a tecnologia como arma contra a desigualdade.</p>
        
        <div class="countdown">
            <div class="unit"><span id="days">00</span>Dias</div>
            <div class="unit"><span id="hours">00</span>Hrs</div>
